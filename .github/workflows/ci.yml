name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov black

      - name: Check formatting with black
        run: |
          dirs=""
          [ -d scripts ] && dirs="$dirs scripts/"
          [ -d tests ] && dirs="$dirs tests/"
          if [ -n "$dirs" ]; then
            black --check $dirs || echo "Formatting issues found."
          else
            echo "No scripts/ or tests/ directories yet — skipping."
          fi

      - name: Lint with ruff
        run: |
          dirs=""
          [ -d scripts ] && dirs="$dirs scripts/"
          [ -d tests ] && dirs="$dirs tests/"
          if [ -n "$dirs" ]; then
            ruff check $dirs
          else
            echo "No scripts/ or tests/ directories yet — skipping."
          fi

      - name: Run tests with pytest
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --cov=scripts/ --cov-report=term-missing || echo "No tests found yet."
          else
            echo "No tests/ directory yet — skipping."
          fi
