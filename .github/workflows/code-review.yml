name: Code Review

on:
  pull_request:
    branches: [main]

jobs:
  lint-extended:
    name: Extended Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint (extended rules)
        run: |
          ruff check scripts/ tests/ \
            --select E,W,F,I,N,D,UP,B,S,C4,RET,SIM,C90,ERA,PL,PERF \
            --statistics

      - name: Ruff format check
        run: ruff format --check scripts/ tests/

  complexity:
    name: Complexity Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install radon
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          echo "## Cyclomatic Complexity Report"
          echo ""

          # Grade C or worse = warning, Grade D/E/F = fail
          # -nc: show complexity grade, -s: show score, -a: show average
          RESULT=$(radon cc scripts/ -s -a -nc 2>&1)
          echo "$RESULT"

          # Check for D, E, or F grades (high complexity — fail the build)
          if echo "$RESULT" | grep -qE "^\s+[A-Z] .* - [DEF]"; then
            echo ""
            echo "::error::Functions with complexity grade D, E, or F detected — refactor required"
            exit 1
          fi

          # Check for C grades (moderate complexity — warn)
          if echo "$RESULT" | grep -qE "^\s+[A-Z] .* - C"; then
            echo ""
            echo "::warning::Functions with complexity grade C detected — consider refactoring"
          fi

          echo ""
          echo "Complexity check passed"

      - name: Check maintainability index
        run: |
          echo "## Maintainability Index"
          echo ""
          # Show maintainability index, fail if any file scores below 20 (very low)
          radon mi scripts/ -s

          # Grade C or worse = potential issue
          if radon mi scripts/ -s | grep -qE "^\S.* - [CF]"; then
            echo "::warning::Some files have low maintainability index"
          fi

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage (80% gate)
        run: |
          pytest tests/ -v \
            --cov=scripts \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=80

  ai-antipatterns:
    name: AI Anti-Pattern Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for AI anti-patterns
        run: |
          #!/bin/bash
          set -euo pipefail
          WARNINGS=0

          echo "## AI Anti-Pattern Detection"
          echo ""

          # 1. Excessive comments: lines that are comments vs code
          TOTAL_LINES=$(find scripts/ -name '*.py' -exec cat {} + | wc -l)
          COMMENT_LINES=$(find scripts/ -name '*.py' -exec cat {} + | grep -cE '^\s*#' || true)
          if [ "$TOTAL_LINES" -gt 0 ]; then
            RATIO=$((COMMENT_LINES * 100 / TOTAL_LINES))
            echo "Comment ratio: ${RATIO}% (${COMMENT_LINES}/${TOTAL_LINES} lines)"
            if [ "$RATIO" -gt 30 ]; then
              echo "::warning::Comment ratio ${RATIO}% exceeds 30% — check for excessive WHAT comments"
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          # 2. Phantom error handling: bare except or overly broad catches
          BARE_EXCEPT=$(grep -rnc 'except:$\|except Exception:$' scripts/ || true)
          if [ "$BARE_EXCEPT" -gt 3 ]; then
            echo "::warning::Found ${BARE_EXCEPT} bare/broad except clauses — check for phantom error handling"
            WARNINGS=$((WARNINGS + 1))
          fi

          # 3. God functions: functions over 30 lines (via radon)
          pip install radon -q
          LONG_FUNCS=$(radon cc scripts/ -n C -s 2>&1 | grep -cE '- [CDEF]' || true)
          if [ "$LONG_FUNCS" -gt 0 ]; then
            echo "::warning::Found ${LONG_FUNCS} functions with complexity grade C or worse"
            WARNINGS=$((WARNINGS + 1))
          fi

          # 4. Dead code: unused imports (ruff F401)
          pip install ruff -q
          UNUSED=$(ruff check scripts/ --select F401 --statistics 2>&1 | tail -1 || true)
          if echo "$UNUSED" | grep -q "F401"; then
            echo "::warning::Unused imports detected — possible dead code"
            WARNINGS=$((WARNINGS + 1))
          fi

          # 5. TODO/FIXME/HACK accumulation
          TODOS=$(grep -rnc 'TODO\|FIXME\|HACK\|XXX' scripts/ || true)
          if [ "$TODOS" -gt 10 ]; then
            echo "::warning::Found ${TODOS} TODO/FIXME/HACK markers — review for stale items"
            WARNINGS=$((WARNINGS + 1))
          fi

          # 6. Assertion density: avg assertions per test function (target >= 1.5, hard fail)
          echo ""
          echo "### Assertion Density"
          TEST_FUNCS=$(grep -rc 'def test_' tests/ 2>/dev/null | awk -F: '{s+=$2} END {print s+0}')
          # Count only lines that are actual assertions (start with assert or contain pytest.raises in a with block)
          ASSERT_COUNT=$(find tests/ -name '*.py' -exec grep -hc '^\s*assert \|pytest\.raises' {} + 2>/dev/null | awk '{s+=$1} END {print s+0}')
          if [ "$TEST_FUNCS" -gt 0 ]; then
            # Integer math: multiply by 10 for one decimal place
            DENSITY_X10=$((ASSERT_COUNT * 10 / TEST_FUNCS))
            DENSITY_INT=$((DENSITY_X10 / 10))
            DENSITY_DEC=$((DENSITY_X10 % 10))
            echo "Assertion density: ${DENSITY_INT}.${DENSITY_DEC} assertions/test (${ASSERT_COUNT} assertions in ${TEST_FUNCS} tests)"
            if [ "$DENSITY_X10" -lt 15 ]; then
              echo "::error::Assertion density ${DENSITY_INT}.${DENSITY_DEC} is below 1.5 — tests are too shallow. Each test should verify multiple properties."
              exit 1
            elif [ "$DENSITY_X10" -lt 20 ]; then
              echo "::warning::Assertion density ${DENSITY_INT}.${DENSITY_DEC} is below 2.0 — consider adding more assertions per test"
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          # 7. Boundary test coverage: verify test files contain REAL boundary test logic
          #    Two hard requirements per test file:
          #    (a) At least 1 pytest.raises or assert ... is None / assert ... == [] block
          #    (b) At least 1 test method explicitly named for error/edge paths
          echo ""
          echo "### Boundary Test Coverage"
          BOUNDARY_FAIL=0
          for src_file in $(find scripts/ -name '*.py' -not -name '__init__.py' -not -path '*/configs/*'); do
            module_name=$(basename "$src_file" .py)
            test_file=$(find tests/ -name "test_${module_name}.py" 2>/dev/null | head -1)
            if [ -n "$test_file" ]; then
              # Requirement A: actual error-path assertions (pytest.raises, assert is None, assert == [], etc.)
              ERROR_PATH_ASSERTS=$(grep -cE '^\s*(with\s+pytest\.raises|assert\s+.*\bis\s+None\b|assert\s+.*==\s*\[\]|assert\s+.*==\s*"")' "$test_file" 2>/dev/null || true)
              # Requirement B: test methods named for error/edge scenarios (stricter keywords)
              EDGE_METHODS=$(grep -cE 'def test_.*(none|null|empty|missing|raises|error_|_error|overflow|negative|_zero$|boundary|typeerror|valueerror)' "$test_file" 2>/dev/null || true)

              echo "${test_file}: error_path_asserts=${ERROR_PATH_ASSERTS}, edge_methods=${EDGE_METHODS}"

              if [ "$ERROR_PATH_ASSERTS" -eq 0 ] && [ "$EDGE_METHODS" -eq 0 ]; then
                echo "::error::${test_file} has NO error-path assertions and NO edge-case test methods for ${src_file}"
                echo "::error::  Required: at least 1 pytest.raises block OR assert ... is None OR test method named for error/edge case"
                WARNINGS=$((WARNINGS + 1))
                BOUNDARY_FAIL=1
              elif [ "$ERROR_PATH_ASSERTS" -eq 0 ]; then
                echo "::error::${test_file} has edge-case method names but NO actual error-path assertions (pytest.raises, assert is None, assert == [])"
                echo "::error::  Test methods with edge-case names must include assertion logic that validates error behaviour"
                WARNINGS=$((WARNINGS + 1))
                BOUNDARY_FAIL=1
              fi
            fi
          done
          if [ "$BOUNDARY_FAIL" -eq 1 ]; then
            echo ""
            echo "::error::Boundary test coverage check failed — add pytest.raises, None checks, or empty-collection assertions"
            exit 1
          fi

          # 8. Security suppression audit: ban noqa on security rules without justification
          echo ""
          echo "### Security Suppression Audit"
          NOQA_SECURITY=$(grep -rnE '#\s*noqa:\s*S[0-9]' scripts/ tests/ 2>/dev/null || true)
          if [ -n "$NOQA_SECURITY" ]; then
            NOQA_COUNT=$(echo "$NOQA_SECURITY" | wc -l | tr -d ' ')
            echo "$NOQA_SECURITY"
            echo ""
            echo "::error::Found ${NOQA_COUNT} security rule suppression(s) (# noqa: S...) — security warnings must not be silenced"
            echo "::error::  Fix the underlying issue instead of suppressing it. If truly a false positive, document why in a code comment above the line."
            exit 1
          else
            echo "No security rule suppressions found"
          fi

          echo ""
          if [ "$WARNINGS" -gt 0 ]; then
            echo "Found ${WARNINGS} potential AI anti-pattern(s) — review recommended"
          else
            echo "No AI anti-patterns detected"
          fi

  secret-scanning:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mutation-spot-check:
    name: Mutation Spot Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mutmut

      - name: Run mutation testing on changed source files
        run: |
          #!/bin/bash
          set -euo pipefail

          echo "## Mutation Spot Check (PR-level)"
          echo ""

          # Get Python source files changed in this PR
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'scripts/**/*.py' | grep -v '__init__\|configs/' || true)

          if [ -z "$CHANGED" ]; then
            echo "No source files changed — skipping mutation testing"
            exit 0
          fi

          echo "Changed source files:"
          echo "$CHANGED"
          echo ""

          TOTAL_MUTANTS=0
          KILLED_MUTANTS=0

          for src_file in $CHANGED; do
            if [ ! -f "$src_file" ]; then
              continue
            fi

            echo "---"
            echo "Mutating: $src_file"

            # Run mutmut on this single file (timeout 120s per file)
            timeout 120 mutmut run --paths-to-mutate "$src_file" --no-progress 2>&1 || true

            # Parse results
            RESULTS=$(mutmut results 2>&1 || true)
            echo "$RESULTS"

            FILE_KILLED=$(echo "$RESULTS" | grep -c 'Killed' || true)
            FILE_SURVIVED=$(echo "$RESULTS" | grep -c 'Survived' || true)
            FILE_TOTAL=$((FILE_KILLED + FILE_SURVIVED))

            TOTAL_MUTANTS=$((TOTAL_MUTANTS + FILE_TOTAL))
            KILLED_MUTANTS=$((KILLED_MUTANTS + FILE_KILLED))

            # Reset for next file
            rm -f .mutmut-cache

            echo ""
          done

          if [ "$TOTAL_MUTANTS" -gt 0 ]; then
            SCORE=$((KILLED_MUTANTS * 100 / TOTAL_MUTANTS))
            echo "## Mutation Score: ${SCORE}% (${KILLED_MUTANTS}/${TOTAL_MUTANTS} killed)"

            if [ "$SCORE" -lt 60 ]; then
              echo "::error::Mutation score ${SCORE}% is below 60% — tests are not catching real bugs. Add boundary, error, and edge-case tests."
              exit 1
            elif [ "$SCORE" -lt 75 ]; then
              echo "::warning::Mutation score ${SCORE}% is below 75% — consider adding more thorough tests"
            else
              echo "Mutation score is healthy"
            fi
          else
            echo "No mutants generated — files may be too simple or have no testable logic"
          fi

  duplication:
    name: Duplication Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Check for duplicate code
        run: |
          jscpd \
            --pattern "**/*.py" \
            --ignore "node_modules,__pycache__,.pytest_cache,*.egg-info" \
            --min-lines 10 \
            --min-tokens 50 \
            --threshold 5 \
            --reporters "console" \
            .

  dependency-allowlist:
    name: Dependency Allowlist Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for unapproved dependencies
        run: |
          #!/bin/bash
          set -euo pipefail

          echo "## Dependency Allowlist Check"
          echo ""

          if [ ! -f requirements-allowlist.txt ]; then
            echo "::error::requirements-allowlist.txt not found — create it with approved package names"
            exit 1
          fi

          UNAPPROVED=0

          # Extract package names from requirements.txt (strip versions, comments, blank lines)
          while IFS= read -r line; do
            # Skip comments and blank lines
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// /}" ]] && continue

            # Extract package name (before any version specifier)
            pkg=$(echo "$line" | sed 's/[><=!].*//' | sed 's/\[.*//' | tr -d '[:space:]')
            [ -z "$pkg" ] && continue

            # Normalize: lowercase for comparison
            pkg_lower=$(echo "$pkg" | tr '[:upper:]' '[:lower:]')

            # Check if package is in the allowlist (case-insensitive)
            if ! grep -iq "^${pkg}$\|^${pkg_lower}$" requirements-allowlist.txt 2>/dev/null; then
              echo "::error::UNAPPROVED dependency: '${pkg}' is not in requirements-allowlist.txt"
              echo "  → If this is intentional, add '${pkg}' to requirements-allowlist.txt"
              UNAPPROVED=$((UNAPPROVED + 1))
            else
              echo "✓ ${pkg} — approved"
            fi
          done < requirements.txt

          echo ""
          if [ "$UNAPPROVED" -gt 0 ]; then
            echo "::error::Found ${UNAPPROVED} unapproved dependency/ies — add them to requirements-allowlist.txt or remove from requirements.txt"
            exit 1
          else
            echo "All dependencies are on the approved list"
          fi
