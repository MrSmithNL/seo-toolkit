site_name: SEO Toolkit (PROD-001)
site_description: Documentation for the SEO Toolkit — multi-website SEO automation
site_url: https://mrsmithnl.github.io/seo-toolkit/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - toc.integrate

extra:
  homepage: https://mrsmithnl.github.io/smith-ai-agency/

plugins:
  - search
  - encryptcontent:
      global_password: !ENV [DOCS_PASSWORD, 'SmithAI2026!']
      title_prefix: ''
      summary: 'This page is password protected.'
      placeholder: 'Enter password'
      encryption_info_message: 'Access restricted — enter password to view.'
      search_index: 'encrypted'
      remember_password: true
      session_storage: true

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Strategy:
    - Business Case: business-case.md
    - Market Research: market-research.md
    - Competitor Analysis: competitor-analysis.md
    - Competitor Recommendations: competitor-recommendations.md
    - Roadmap: roadmap.md
    - Strategic OS: strategic-os.md
  - Architecture:
    - System Architecture: architecture.md
    - Coding Standards: coding-standards.md
  - Agents:
    - Audit Agent: agents/audit-agent.md
    - Keywords Agent: agents/keywords-agent.md
    - Content Optimizer: agents/content-optimizer-agent.md
    - Content Writer: agents/content-writer-agent.md
    - Link Builder: agents/link-builder-agent.md
    - Rank Tracker: agents/rank-tracker-agent.md
    - AI Discovery: agents/ai-discovery-agent.md
    - Schema Audit: agents/schema-audit-agent.md
