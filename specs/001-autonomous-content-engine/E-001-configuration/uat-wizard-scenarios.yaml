project: PROD-001
epic: E-001
version: v0.1.0
title: "Configuration & Setup"
deployment_type: cli

prerequisites:
  - step: "Open your terminal"
    command: ""
  - step: "Go to the SEO Toolkit project folder"
    command: "cd ~/Claude\\ Code/Projects/seo-toolkit"
  - step: "Install all dependencies"
    command: "pnpm install"
  - step: "Build the project"
    command: "pnpm build"

scenarios:
  - id: F1-REG
    feature: "Site Registration"
    title: "Register a website"
    description: >
      The system should be able to register a new website URL, validate it,
      and store the site configuration. This is the foundation — if a site
      can't be registered, nothing else works.
    command: "pnpm vitest run src/modules/content-engine/config/site-registration/__tests__/site.service.test.ts"
    checks:
      - "All tests show green (passing)"
      - "Site can be registered with a valid URL"
      - "Duplicate URLs are rejected with a clear error"
      - "Invalid URLs are rejected"
      - "Site can be retrieved by its ID"
    severity: blocker
    source_ref: "F-001, AT-001"

  - id: F2-CMS
    feature: "CMS Detection"
    title: "Detect WordPress and Shopify sites"
    description: >
      When a website is registered, the system automatically detects whether
      it runs WordPress or Shopify. This is important because the system
      needs to know which CMS API to connect to.
    command: "pnpm vitest run src/modules/content-engine/config/site-registration/__tests__/detectors.test.ts"
    checks:
      - "All tests show green (passing)"
      - "WordPress is detected via the wp-json endpoint"
      - "WordPress is detected via the wp-login.php fallback"
      - "Shopify is detected via cdn.shopify.com"
      - "Returns 'unknown' for non-CMS sites"
      - "Shopify password pages don't incorrectly detect as WordPress"
      - "Network errors are handled without crashing"
    severity: blocker
    source_ref: "F-001, AT-002"

  - id: F3-CONN
    feature: "CMS Connection"
    title: "Store API credentials securely"
    description: >
      Once a CMS is detected, the system stores API credentials
      (like WordPress application passwords or Shopify API keys)
      so it can publish content. Credentials must be encrypted.
    command: "pnpm vitest run src/modules/content-engine/config/cms-connection/__tests__/cms.service.test.ts"
    checks:
      - "All tests show green (passing)"
      - "CMS connection can be created with an API key"
      - "API keys are encrypted before storage (not stored in plain text)"
      - "Connection can be tested (validates credentials work)"
      - "Connection can be revoked (deleted)"
    severity: blocker
    source_ref: "F-002, AT-003"

  - id: F4-VOICE
    feature: "Brand Voice Profile"
    title: "Configure brand voice settings"
    description: >
      Each website has a brand voice profile that controls the tone and
      style of generated content. This ensures articles match the brand's
      personality.
    command: "pnpm vitest run src/modules/content-engine/config/brand-voice/__tests__/voice.service.test.ts"
    checks:
      - "All tests show green (passing)"
      - "Voice profile can be created"
      - "Multiple voice profiles supported per site"
      - "Voice profile can be updated"
    severity: major
    source_ref: "F-003, AT-004"

  - id: F5-TOPIC
    feature: "Topic Configuration"
    title: "Define content topics and schedules"
    description: >
      Topics define what the content engine writes about. Each topic has
      keywords, a schedule (daily, weekly, monthly), and can be paused
      or resumed.
    command: "pnpm vitest run src/modules/content-engine/config/topic-config/__tests__/topic.service.test.ts"
    checks:
      - "All tests show green (passing)"
      - "Topics can be created with keywords"
      - "Schedule can be set (daily, weekly, monthly)"
      - "Topics can be paused and resumed"
    severity: major
    source_ref: "F-004, AT-005"

  - id: F6-QUAL
    feature: "Quality Thresholds"
    title: "Set minimum content quality standards"
    description: >
      Quality thresholds define the minimum standards for generated content
      (e.g., minimum word count, maximum AI detection score). Content that
      doesn't meet these thresholds gets flagged for review.
    command: "pnpm vitest run src/modules/content-engine/config/quality-thresholds/__tests__/quality.service.test.ts"
    checks:
      - "All tests show green (passing)"
      - "Thresholds can be configured (min word count, max AI score, etc.)"
      - "Default thresholds are applied when not specified"
      - "Invalid threshold values are rejected"
    severity: major
    source_ref: "F-005, AT-006"

cross_cutting:
  - id: FULL-SUITE
    feature: "Full Test Suite"
    title: "All tests pass together"
    description: >
      Run the complete test suite to make sure all features work together
      without conflicts.
    command: "pnpm test"
    checks:
      - "All 255 tests pass (zero failures)"
      - "No tests are skipped or disabled"
    severity: blocker
    source_ref: "All features"

  - id: TYPECHECK
    feature: "Type Safety"
    title: "TypeScript compiles without errors"
    description: >
      TypeScript type checking verifies that all the code is internally
      consistent — no type mismatches, missing properties, or incorrect
      function calls.
    command: "pnpm typecheck"
    checks:
      - "Zero TypeScript errors"
    severity: blocker
    source_ref: "Infrastructure"

  - id: SCHEMA
    feature: "Database Schema"
    title: "Database tables are correctly structured"
    description: >
      The database schema must have proper multi-tenant isolation
      (every table has a tenant_id) and correct ID prefixes.
    command: "pnpm vitest run src/db/schema.test.ts"
    checks:
      - "All tables have tenant_id column"
      - "All IDs use correct prefixes (ste_, cms_, vce_, tpc_)"
    severity: blocker
    source_ref: "Database layer"

  - id: SMOKE
    feature: "Real Site Detection"
    title: "Test against live websites"
    description: >
      Smoke tests verify that CMS detection works against real websites
      (Hairgenetix and Skingenetix). These tests make real HTTP requests.
    command: "pnpm vitest run tests/smoke/real-site-detection.test.ts"
    checks:
      - "Hairgenetix.com detected as Shopify"
      - "Skingenetix.com detected as Shopify"
    severity: major
    source_ref: "E2E validation"

exploratory:
  - "Try registering the same URL twice — does it give a clear error message?"
  - "Try an invalid URL (no protocol, bad domain) — does it reject gracefully?"
  - "Check error messages — are they clear and helpful, not technical jargon?"
  - "Check the feature flag — is content-engine-v1 set to true in src/lib/feature-flags.ts?"
