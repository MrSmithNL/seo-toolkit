feature: F-006 AISO Preferences
service: AisoService
safety_checks:
  - "Default uses recommended=true with 36-factor model"
  - "Factor validation against registry"
  - "Schema type and platform validation"

cases:
  - name: "Create recommended defaults"
    method: createDefaults
    input:
      siteId: "ste_test1"
    expect:
      success: true
      data:
        useRecommended: true
        id_pattern: "^asp_"

  - name: "Customise priority factors"
    method: updatePreferences
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
      useRecommended: false
      priorityFactors: ["schema_faq", "citation_authority"]
    expect:
      success: true
      data:
        useRecommended: false

  - name: "Reject unknown factor IDs"
    method: updatePreferences
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
      priorityFactors: ["fake_factor"]
    expect:
      success: false
      error:
        status: 400

  - name: "Update schema types"
    method: updatePreferences
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
      schemaTypes: ["Article", "Product", "HowTo"]
    expect:
      success: true

  - name: "Reject invalid schema type"
    method: updatePreferences
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
      schemaTypes: ["InvalidSchema"]
    expect:
      success: false
      error:
        status: 400

  - name: "Reset to recommended"
    method: resetToRecommended
    setup: customise_first
    input:
      siteId: "ste_test1"
    expect:
      success: true
      data:
        useRecommended: true
