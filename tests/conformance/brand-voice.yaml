feature: F-003 Brand Voice
service: VoiceService
safety_checks:
  - "LLM extraction uses pluggable interface (not hardcoded)"
  - "Default voice profile uses sensible defaults"
  - "Partial updates preserve unchanged fields"

cases:
  - name: "Extract voice from LLM"
    method: extractVoice
    input:
      siteId: "ste_test1"
      sourceUrl: "https://example.com"
    expect:
      success: true
      data:
        id_pattern: "^vce_"

  - name: "Create defaults"
    method: createDefaults
    input:
      siteId: "ste_test1"
    expect:
      success: true
      data:
        tone: "professional"

  - name: "Get profile returns 404 for unconfigured site"
    method: getProfile
    input:
      siteId: "ste_novoice"
    expect:
      success: false
      error:
        status: 404

  - name: "Update individual parameters"
    method: updateProfile
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
      tone: "casual"
    expect:
      success: true
      data:
        tone: "casual"

  - name: "Idempotent defaults creation"
    method: createDefaults
    setup: create_defaults_first
    input:
      siteId: "ste_test1"
    expect:
      success: true
