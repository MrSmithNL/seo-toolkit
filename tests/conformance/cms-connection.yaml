feature: F-002 CMS Connection
service: CmsService
safety_checks:
  - "Credentials encrypted at rest with AES-256-GCM"
  - "One CMS connection per site enforced"
  - "Connection status tracked (connected/verified/failed)"

cases:
  - name: "Connect WordPress CMS"
    method: connect
    input:
      siteId: "ste_test1"
      cmsType: "wordpress"
      credentials:
        wpSiteUrl: "https://example.com"
        wpUsername: "admin"
        wpApplicationPassword: "xxxx"
    expect:
      success: true
      data:
        id_pattern: "^cms_"
        cmsType: "wordpress"

  - name: "Connect Shopify CMS"
    method: connect
    input:
      siteId: "ste_test2"
      cmsType: "shopify"
      credentials:
        shopifyStoreDomain: "myshop.myshopify.com"
        shopifyAccessToken: "shpat_xxxx"
    expect:
      success: true
      data:
        cmsType: "shopify"

  - name: "Reject duplicate connection for same site"
    method: connect
    setup: connect_first
    input:
      siteId: "ste_test1"
      cmsType: "wordpress"
    expect:
      success: false
      error:
        status: 409

  - name: "Get connection returns 404 for unconfigured site"
    method: getConnection
    input:
      siteId: "ste_noconnection"
    expect:
      success: false
      error:
        status: 404

  - name: "Update connection status"
    method: updateStatus
    setup: connect_first
    input:
      connectionId: "from_setup"
      status: "verified"
    expect:
      success: true
      data:
        status: "verified"
