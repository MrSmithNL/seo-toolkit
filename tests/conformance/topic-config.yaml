feature: F-004 Topic Configuration
service: TopicService
safety_checks:
  - "Keywords deduplicated and normalised to lowercase"
  - "Small set (≤5) creates single cluster"
  - "Re-running replaces existing config (idempotent)"

cases:
  - name: "Set manual keywords with clustering"
    method: setTopics
    input:
      siteId: "ste_test1"
      keywords: ["hair growth", "biotin", "hair loss", "keratin", "hair vitamins", "supplements"]
    expect:
      success: true
      data:
        config:
          source: "manual"
          id_pattern: "^tpc_"

  - name: "Small keyword set creates single cluster"
    method: setTopics
    input:
      siteId: "ste_test1"
      keywords: ["seo", "content"]
    expect:
      success: true
      data:
        clusters_length: 1

  - name: "Infer topics from page data"
    method: inferTopics
    input:
      siteId: "ste_test1"
      pageData: ["<title>Hair Growth</title>"]
    expect:
      success: true
      data:
        config:
          source: "auto_inferred"

  - name: "Reject empty keyword list"
    method: setTopics
    input:
      siteId: "ste_test1"
      keywords: []
    expect:
      success: false
      error:
        status: 400

  - name: "Get topics returns 404 for unconfigured site"
    method: getTopics
    input:
      siteId: "ste_noconfig"
    expect:
      success: false
      error:
        status: 404

  - name: "Update cluster priority"
    method: updateClusterPriority
    setup: set_topics_first
    input:
      clusterId: "from_setup"
      priority: "low"
    expect:
      success: true
      data:
        priority: "low"
